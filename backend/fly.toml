app = "planfin-api"
primary_region = "gru"

[build]

[deploy]
  release_command = "/app/bin/migrate"

[env]
  PHX_SERVER = "true"
  PHX_HOST = "planfin-api.fly.dev"
  ECTO_IPV6 = "true"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
