name: Backend CI

on:
  push:
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        elixir: ['1.17']
        otp: ['27']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: planfin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: backend/deps
          key: ${{ runner.os }}-mix-${{ hashFiles('backend/mix.lock') }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: backend/_build
          key: ${{ runner.os }}-build-${{ hashFiles('backend/mix.lock') }}

      - name: Install deps
        working-directory: backend
        run: mix deps.get

      - name: Check formatting
        working-directory: backend
        run: mix format --check-formatted

      - name: Compile (warnings as errors)
        working-directory: backend
        run: mix compile --warnings-as-errors
        env:
          MIX_ENV: test

      - name: Run tests
        working-directory: backend
        run: mix test
        env:
          MIX_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost/planfin_test
